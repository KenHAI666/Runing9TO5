<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runing9TO5 後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 品牌配色 */
      --bg:           #f5f0ea;
      --bg-card:      #faf8f5;
      --bg-section:   #ede8e0;
      --bg-sidebar:   #f0ece5;
      --border:       #d8ccbc;
      --border-soft:  #e8e2d8;

      --text:         #1a2540;
      --text-sub:     #3d4f6e;
      --text-muted:   #8896aa;

      --blue:         #2d4a7a;
      --blue-dark:    #1e3560;
      --blue-light:   #e4ecf8;
      --blue-mid:     #4a6fa0;

      --brown:        #9e7048;
      --brown-dark:   #7e5838;
      --brown-light:  #f5ede3;

      --success:      #3a7d5c;
      --success-light:#e6f4ec;
      --danger:       #c0392b;
      --danger-light: #fdecea;

      --mono: 'JetBrains Mono', monospace;
      --radius: 6px;
      --radius-lg: 10px;
      --shadow: 0 1px 4px rgba(26,37,64,0.08);
      --shadow-md: 0 4px 16px rgba(26,37,64,0.12);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ════════════════════════════════
       登入頁
    ════════════════════════════════ */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #loginScreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      box-shadow: var(--shadow-md);
      animation: loginFadeIn 0.45s ease both;
    }

    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-mark {
      font-size: 28px;
      color: var(--blue);
      display: block;
      margin-bottom: 10px;
    }

    .login-logo-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .login-logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-field { margin-bottom: 16px; }

    .login-label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .login-input-wrap { position: relative; }

    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 40px 10px 13px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--mono);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(45,74,122,0.10);
    }
    .login-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.10);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-3px); }
      80%      { transform: translateX(3px); }
    }

    .eye-toggle {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 15px; padding: 2px; transition: color 0.15s;
    }
    .eye-toggle:hover { color: var(--text); }

    .login-error {
      font-size: 12px; color: var(--danger);
      margin-top: 6px; display: none;
    }

    .login-btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px;
      font-size: 14px; font-weight: 600;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover  { background: var(--blue-dark); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

    .login-hint {
      margin-top: 22px; padding: 12px 14px;
      background: var(--blue-light);
      border-radius: var(--radius);
      border: 1px solid rgba(45,74,122,0.15);
    }
    .login-hint-title {
      font-size: 11px; font-weight: 700; color: var(--blue);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px;
    }
    .login-hint-text { font-size: 12px; color: var(--text-sub); line-height: 1.7; }
    .login-hint-text code {
      font-family: var(--mono);
      background: rgba(45,74,122,0.12); padding: 1px 6px;
      border-radius: 3px; color: var(--blue); font-size: 12px;
    }

    .attempts-bar { display: flex; gap: 5px; margin-top: 12px; }
    .attempt-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: background 0.3s;
    }
    .attempt-dot.used { background: var(--danger); }

    /* ════════════════════════════════
       後台主體
    ════════════════════════════════ */
    #adminApp {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-logo {
      font-family: 'Noto Serif TC', serif;
      font-size: 14px; font-weight: 700; color: var(--blue);
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 8px;
    }
    .topbar-logo span { color: var(--text-muted); font-weight: 400; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; }

    .topbar-right { display: flex; align-items: center; gap: 14px; }

    .topbar-status {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--success); }

    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-light); }

    /* ── Layout ── */
    .layout {
      display: flex; flex: 1;
      overflow: hidden;
      height: calc(100vh - 56px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 264px; min-width: 264px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border-soft);
    }

    .sidebar-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    .form-group { margin-bottom: 10px; }
    .form-label {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 4px; display: block;
    }
    .form-input {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 7px 10px; color: var(--text);
      font-size: 12px; font-family: var(--mono);
      transition: border-color 0.2s; outline: none;
    }
    .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(45,74,122,0.08); }
    .form-input::placeholder { color: var(--border); }

    .settings-note {
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius); padding: 9px 11px;
      font-size: 11px; color: var(--text-muted); line-height: 1.7; margin-top: 8px;
    }
    .settings-note a { color: var(--blue); text-decoration: none; }
    .settings-note a:hover { text-decoration: underline; }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: var(--radius);
      padding: 8px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .btn-primary {
      background: var(--blue); color: #fff;
      width: 100%; justify-content: center;
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.6; }

    .btn-secondary {
      background: var(--bg-card); color: var(--text-sub);
      border: 1px solid var(--border); width: 100%; justify-content: center;
    }
    .btn-secondary:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }

    .btn-success {
      background: var(--blue); color: #fff;    /* 主 CTA = 深藍 */
      width: 100%; justify-content: center;
    }
    .btn-success:hover { background: var(--blue-dark); }
    .btn-success:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.6; }

    .btn-brown {
      background: var(--brown-light); color: var(--brown-dark);
      border: 1.5px solid var(--brown); width: 100%; justify-content: center;
    }
    .btn-brown:hover { background: #e8d5be; color: var(--brown-dark); }

    .btn-danger {
      background: transparent; color: var(--danger);
      border: 1px solid var(--danger); width: 100%; justify-content: center;
    }
    .btn-danger:hover { background: var(--danger-light); }

    /* ── Post list ── */
    .post-list { padding: 6px 0; }

    .post-item {
      padding: 9px 14px; border-radius: var(--radius); cursor: pointer;
      display: flex; flex-direction: column; gap: 2px;
      transition: background 0.15s; position: relative; margin: 2px 0;
    }
    .post-item:hover { background: var(--bg-card); }
    .post-item.active { background: var(--blue-light); }
    .post-item.active .post-item-title { color: var(--blue); }

    .post-item-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 24px;
    }
    .post-item-date { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }

    .post-item-del {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.15s; padding: 4px;
    }
    .post-item:hover .post-item-del { opacity: 1; }
    .post-item-del:hover { color: var(--danger) !important; }

    .new-post-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; color: var(--text-muted);
      cursor: pointer; font-size: 12px; border-radius: var(--radius);
      transition: all 0.15s; border: 1px dashed var(--border);
      margin: 6px 0 4px; background: transparent;
    }
    .new-post-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-light); }

    /* ── Checkbox groups ── */
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 5px; }
    .cb-item {
      display: flex; align-items: center; gap: 4px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 9px;
      font-size: 11px; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .cb-item:hover { border-color: var(--blue-mid); color: var(--text); }
    .cb-item input[type=checkbox] { display: none; }
    .cb-item.checked { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Main area ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }

    .editor-toolbar {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }

    .tab-bar { display: flex; gap: 3px; }
    .tab {
      padding: 5px 12px; font-size: 12px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      border-radius: var(--radius); transition: all 0.15s; border: 1px solid transparent;
    }
    .tab:hover { color: var(--text); background: var(--bg); }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .toolbar-divider { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }

    .toolbar-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-sub); border-radius: 4px;
      padding: 4px 9px; font-size: 12px; cursor: pointer;
      transition: all 0.15s; font-family: var(--mono);
    }
    .toolbar-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

    .word-count {
      font-size: 11px; color: var(--text-muted); font-family: var(--mono);
      margin-left: auto; padding: 0 4px;
    }

    /* ── Editor panes ── */
    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .editor-pane, .preview-pane {
      flex: 1; overflow-y: auto; padding: 28px 36px;
    }

    .title-input {
      width: 100%; background: none; border: none; outline: none;
      color: var(--text); font-size: 24px; font-weight: 700;
      font-family: 'Noto Serif TC', serif;
      margin-bottom: 6px;
      border-bottom: 2px solid var(--border-soft);
      padding-bottom: 12px; transition: border-color 0.2s;
    }
    .title-input:focus { border-bottom-color: var(--blue); }
    .title-input::placeholder { color: var(--border); }

    .desc-input {
      width: 100%; background: none; border: none; outline: none;
      color: var(--text-sub); font-size: 13px;
      font-family: 'Noto Sans TC', sans-serif;
      margin-bottom: 18px; resize: none; line-height: 1.6;
    }
    .desc-input::placeholder { color: var(--border); }

    .content-editor {
      width: 100%; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.85; resize: none;
      min-height: calc(100vh - 280px);
    }
    .content-editor::placeholder { color: var(--border); }

    /* ── Preview pane ── */
    .preview-pane { background: var(--bg-card); }
    .preview-content {
      max-width: 660px; margin: 0 auto;
      color: var(--text-sub); font-family: 'Noto Sans TC', sans-serif; line-height: 1.85;
    }
    .preview-content h1 { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .preview-content h2 {
      font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700;
      margin: 24px 0 10px; color: var(--text);
      border-left: 3px solid var(--blue); padding-left: 12px;
    }
    .preview-content h3 { font-size: 15px; font-weight: 700; margin: 18px 0 8px; color: var(--text); }
    .preview-content p { margin-bottom: 14px; font-size: 14px; }
    .preview-content strong { font-weight: 700; color: var(--text); }
    .preview-content em { font-style: italic; color: var(--text-muted); }
    .preview-content ul, .preview-content ol { padding-left: 22px; margin-bottom: 14px; }
    .preview-content li { margin-bottom: 5px; font-size: 14px; }
    .preview-content blockquote {
      border-left: 3px solid var(--brown); padding-left: 14px;
      color: var(--text-muted); font-style: italic; margin: 18px 0;
      background: var(--brown-light); border-radius: 0 var(--radius) var(--radius) 0; padding: 10px 14px;
    }
    .preview-content code {
      background: var(--bg-section); padding: 1px 6px;
      border-radius: 3px; font-family: var(--mono); font-size: 12px; color: var(--blue);
    }
    .preview-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .preview-meta {
      color: var(--text-muted); font-size: 12px;
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border-soft);
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); gap: 10px; text-align: center; padding: 40px;
    }
    .empty-state-icon { font-size: 40px; opacity: 0.35; }
    .empty-state-title { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .empty-state-desc { font-size: 13px; max-width: 260px; line-height: 1.7; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 22px; right: 22px; z-index: 9999;
      display: flex; flex-direction: column; gap: 7px;
    }
    .toast {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 15px; font-size: 13px;
      color: var(--text); box-shadow: var(--shadow-md);
      animation: toastIn 0.3s ease;
      display: flex; align-items: center; gap: 8px; min-width: 220px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.loading { border-left: 3px solid var(--blue); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26,37,64,0.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px; width: 400px; max-width: 90vw;
      box-shadow: var(--shadow-md);
    }
    .modal-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .modal-desc  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* ── Change password ── */
    .change-pw-section {
      margin-top: 14px; border-top: 1px solid var(--border-soft); padding-top: 14px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 220px; min-width: 220px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════
     登入畫面
════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-mark">✦</span>
      <div class="login-logo-title">Runing9TO5 後台</div>
      <div class="login-logo-sub">請輸入密碼以繼續</div>
    </div>

    <div class="login-field">
      <label class="login-label">密碼</label>
      <div class="login-input-wrap">
        <input class="login-input" type="password" id="pwInput"
               placeholder="••••••••"
               onkeydown="if(event.key==='Enter') doLogin()">
        <button class="eye-toggle" onclick="toggleEye()" id="eyeBtn">👁</button>
      </div>
      <div class="login-error" id="loginError"></div>
    </div>

    <button class="login-btn" onclick="doLogin()" id="loginBtn">
      進入後台 →
    </button>

    <div class="attempts-bar" id="attemptsBar" style="display:none; margin-top:10px;">
      <div class="attempt-dot" id="dot0"></div>
      <div class="attempt-dot" id="dot1"></div>
      <div class="attempt-dot" id="dot2"></div>
      <div class="attempt-dot" id="dot3"></div>
      <div class="attempt-dot" id="dot4"></div>
    </div>

    <div class="login-hint">
      <div class="login-hint-title">🔑 預設密碼</div>
      <div class="login-hint-text">
        預設密碼為 <code>Runing9TO5!</code><br>
        登入後可在設定區修改密碼。
      </div>

<script>
// ════════════════════════════════
// 登入邏輯
// ════════════════════════════════
const MAX_ATTEMPTS = 5;
let attempts = 0;
let lockUntil = 0;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// BUG FIX: 統一透過 sha256 比對，不依賴 hardcoded hash
async function doLogin() {
  const now = Date.now();
  if (now < lockUntil) {
    const secs = Math.ceil((lockUntil - now) / 1000);
    showLoginError(`帳號已鎖定，請等待 ${secs} 秒`);
    return;
  }

  const pw = document.getElementById('pwInput').value;
  if (!pw) { showLoginError('請輸入密碼'); return; }

  const inputHash = await sha256(pw);
  const storedHash = localStorage.getItem('runing_pw_hash');

  let valid = false;
  if (storedHash) {
    // 已設定過密碼：比對儲存的 hash
    valid = (inputHash === storedHash);
  } else {
    // 第一次登入：比對預設密碼
    const defaultHash = await sha256('Runing9TO5!');
    valid = (inputHash === defaultHash);
    if (valid) {
      // 初始化儲存正確的 hash
      localStorage.setItem('runing_pw_hash', defaultHash);
    }
  }

  if (valid) {
    loginSuccess();
  } else {
    attempts++;
    updateAttemptDots();
    document.getElementById('attemptsBar').style.display = 'flex';

    if (attempts >= MAX_ATTEMPTS) {
      lockUntil = Date.now() + 60 * 1000;
      attempts = 0;
      showLoginError('嘗試次數過多，鎖定 60 秒');
      document.getElementById('loginBtn').disabled = true;
      setTimeout(() => {
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('attemptsBar').style.display = 'none';
        updateAttemptDots();
        hideLoginError();
      }, 60000);
    } else {
      showLoginError(`密碼錯誤（剩餘 ${MAX_ATTEMPTS - attempts} 次嘗試）`);
    }

    const input = document.getElementById('pwInput');
    input.classList.add('error');
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 500);
  }
}

function loginSuccess() {
  sessionStorage.setItem('runing_auth', '1');
  attempts = 0;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'flex';
  document.getElementById('adminApp').style.flexDirection = 'column';
  initAdmin();
}

function doLogout() {
  sessionStorage.removeItem('runing_auth');
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  hideLoginError();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}
function hideLoginError() {
  document.getElementById('loginError').style.display = 'none';
}

function updateAttemptDots() {
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const dot = document.getElementById(`dot${i}`);
    if (dot) dot.className = 'attempt-dot' + (i < attempts ? ' used' : '');
  }
}

function toggleEye() {
  const input = document.getElementById('pwInput');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  document.getElementById('eyeBtn').textContent = isHidden ? '🙈' : '👁';
}

async function changePassword() {
  const np = document.getElementById('newPw').value;
  const cp = document.getElementById('confirmPw').value;
  if (!np || np.length < 6) { showToast('密碼至少 6 個字元', 'error'); return; }
  if (np !== cp) { showToast('兩次密碼不一致', 'error'); return; }
  const hash = await sha256(np);
  localStorage.setItem('runing_pw_hash', hash);
  document.getElementById('newPw').value = '';
  document.getElementById('confirmPw').value = '';
  showToast('✅ 密碼已更新', 'success');
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('runing_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'flex';
    document.getElementById('adminApp').style.flexDirection = 'column';
    initAdmin();
  }
});

// ════════════════════════════════
// 後台邏輯
// ════════════════════════════════
let connected = false;
let posts = [];
let currentPost = null;

function initAdmin() {
  const saved = JSON.parse(localStorage.getItem('runing_admin') || '{}');
  if (saved.token) document.getElementById('ghToken').value = saved.token;
  if (saved.owner) document.getElementById('ghOwner').value = saved.owner;
  if (saved.repo)  document.getElementById('ghRepo').value  = saved.repo;
  document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
  setupCheckboxGroup('categoriesGroup');
  setupCheckboxGroup('tagsGroup');
  document.getElementById('postContent').addEventListener('input', updateWordCount);
}

function saveSettings() {
  localStorage.setItem('runing_admin', JSON.stringify({
    token: document.getElementById('ghToken').value,
    owner: document.getElementById('ghOwner').value,
    repo:  document.getElementById('ghRepo').value,
  }));
}

function getConfig() {
  return {
    token: document.getElementById('ghToken').value.trim(),
    owner: document.getElementById('ghOwner').value.trim(),
    repo:  document.getElementById('ghRepo').value.trim(),
  };
}

async function ghFetch(path, options = {}) {
  const { token, owner, repo } = getConfig();
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}${path}`, {
    ...options,
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function connectGitHub() {
  const { token, owner, repo } = getConfig();
  if (!token || !owner || !repo) { showToast('請填寫完整的 GitHub 設定', 'error'); return; }

  const btn = document.getElementById('connectBtn');
  btn.innerHTML = '<span class="spinner"></span> 連接中...';
  btn.disabled = true;

  try {
    saveSettings();
    await ghFetch('');
    connected = true;
    document.getElementById('statusDot').className = 'status-dot connected';
    document.getElementById('statusText').textContent = `${owner}/${repo}`;
    showToast('✅ 連接成功！', 'success');
    btn.textContent = '重新載入';
    btn.disabled = false;
    await loadPosts();
  } catch (e) {
    showToast(`連接失敗：${e.message}`, 'error');
    btn.textContent = '連接 GitHub';
    btn.disabled = false;
  }
}

async function loadPosts() {
  try {
    const files = await ghFetch('/contents/_posts');
    posts = files.filter(f => f.name.endsWith('.md')).sort((a, b) => b.name.localeCompare(a.name));
    renderPostList();
  } catch (e) {
    showToast(`無法載入文章：${e.message}`, 'error');
  }
}

function renderPostList() {
  const list = document.getElementById('postList');
  if (!posts.length) {
    list.innerHTML = '<div style="padding:14px 4px; text-align:center; font-size:11px; color:var(--text-muted);">尚無文章</div>';
    return;
  }
  list.innerHTML = posts.map((p, i) => {
    const date = p.name.match(/^(\d{4}-\d{2}-\d{2})/)?.[1] || '';
    const name = p.name.replace('.md','').slice(11).replace(/-/g,' ') || p.name;
    return `
      <div class="post-item" onclick="loadPost(${i})" id="postItem_${i}">
        <div class="post-item-title">${name}</div>
        <div class="post-item-date">${date}</div>
        <button class="post-item-del" onclick="event.stopPropagation(); setCurrentAndDelete(${i})">✕</button>
      </div>
    `;
  }).join('');
}

async function loadPost(index) {
  if (!connected) { showToast('請先連接 GitHub', 'error'); return; }
  showToast('載入中...', 'loading', 1200);
  try {
    const data = await ghFetch(`/contents/${posts[index].path}`);
    const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    let fm = {}, body = raw;
    if (fmMatch) {
      fmMatch[1].split('\n').forEach(line => {
        const colon = line.indexOf(':');
        if (colon === -1) return;
        const k = line.slice(0, colon).trim();
        const v = line.slice(colon + 1).trim().replace(/^["']|["']$/g, '');
        if (k) fm[k] = v;
      });
      body = fmMatch[2].trim();
    }

    currentPost = { path: posts[index].path, sha: data.sha, isNew: false };
    document.getElementById('postTitle').value   = fm.title || '';
    document.getElementById('postDesc').value    = fm.description || '';
    document.getElementById('postContent').value = body;
    document.getElementById('postDate').value    = posts[index].name.match(/^(\d{4}-\d{2}-\d{2})/)?.[1] || new Date().toISOString().split('T')[0];

    // BUG FIX: 更健壯的 YAML 陣列解析
    setCheckboxValues('categoriesGroup', parseFmArray(fm.categories || ''));
    setCheckboxValues('tagsGroup', parseFmArray(fm.tags || ''));

    showEditor();
    document.getElementById('deleteBtn').style.display = 'flex';
    updateWordCount();
    document.querySelectorAll('.post-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`postItem_${index}`)?.classList.add('active');
  } catch (e) {
    showToast(`載入失敗：${e.message}`, 'error');
  }
}

// BUG FIX: 處理 ['tag1', 'tag2'] 和 [tag1, tag2] 等不同格式
function parseFmArray(val) {
  if (!val) return [];
  return val
    .replace(/^\[|\]$/g, '')          // 去掉 [ ]
    .split(',')
    .map(s => s.trim().replace(/^['"]|['"]$/g, ''))  // 去掉引號
    .filter(Boolean);
}

function newPost() {
  currentPost = { isNew: true };
  document.getElementById('postTitle').value   = '';
  document.getElementById('postDesc').value    = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postDate').value    = new Date().toISOString().split('T')[0];
  setCheckboxValues('categoriesGroup', []);
  setCheckboxValues('tagsGroup', []);
  showEditor();
  document.getElementById('deleteBtn').style.display = 'none';
  document.querySelectorAll('.post-item').forEach(el => el.classList.remove('active'));
  document.getElementById('postTitle').focus();
}

async function publishPost() {
  if (!connected) { showToast('請先連接 GitHub', 'error'); return; }
  const title   = document.getElementById('postTitle').value.trim();
  const desc    = document.getElementById('postDesc').value.trim();
  const content = document.getElementById('postContent').value.trim();
  const date    = document.getElementById('postDate').value;
  if (!title)   { showToast('請填寫文章標題', 'error'); return; }
  if (!content) { showToast('文章內容不能為空', 'error'); return; }

  const slug = title
    .toLowerCase()
    .replace(/[\s\u3000]+/g, '-')
    .replace(/[^\w\u4e00-\u9fff-]/g, '')
    .slice(0, 60);
  const path = `_posts/${date}-${slug}.md`;

  const cats = getCheckboxValues('categoriesGroup');
  const tgs  = getCheckboxValues('tagsGroup');

  // BUG FIX: 不再用 HTML div 包 content，讓 Jekyll 正常渲染 Markdown
  const fmLines = [
    '---',
    `layout: default`,
    `title: "${title.replace(/"/g, '\\"')}"`,
    `date: ${date}`,
    `description: "${desc.replace(/"/g, '\\"')}"`,
  ];
  if (cats.length) fmLines.push(`categories: [${cats.map(c => `'${c}'`).join(', ')}]`);
  if (tgs.length)  fmLines.push(`tags: [${tgs.map(t => `'${t}'`).join(', ')}]`);
  fmLines.push('---');

  const fullContent = fmLines.join('\n') + '\n\n' + content;
  const encoded = btoa(unescape(encodeURIComponent(fullContent)));

  const btn = document.getElementById('publishBtn');
  btn.innerHTML = '<span class="spinner"></span> 發佈中...';
  btn.disabled = true;

  try {
    const commitMsg = `${currentPost?.isNew ? 'feat' : 'update'}: ${title}`;
    const payload = { message: commitMsg, content: encoded };

    if (!currentPost?.isNew && currentPost?.sha) {
      // 更新現有文章
      payload.sha = currentPost.sha;
      await ghFetch(`/contents/${currentPost.path}`, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      // 新文章：先嘗試 main，失敗再試 master
      try {
        await ghFetch(`/contents/${path}`, { method: 'PUT', body: JSON.stringify({ ...payload, branch: 'main' }) });
      } catch {
        await ghFetch(`/contents/${path}`, { method: 'PUT', body: JSON.stringify({ ...payload, branch: 'master' }) });
      }
    }

    showToast('🎉 文章已發佈！', 'success', 4000);
    await loadPosts();
  } catch (e) {
    showToast(`發佈失敗：${e.message}`, 'error');
  } finally {
    btn.innerHTML = '🚀 發佈文章';
    btn.disabled = false;
  }
}

function setCurrentAndDelete(i) {
  loadPost(i).then(() => confirmDelete());
}

function confirmDelete() {
  if (!currentPost || currentPost.isNew) return;
  document.getElementById('deleteModalDesc').textContent =
    `確定要刪除「${document.getElementById('postTitle').value}」嗎？此操作無法復原。`;
  document.getElementById('deleteModal').style.display = 'flex';
}
function closeModal() { document.getElementById('deleteModal').style.display = 'none'; }

async function deletePost() {
  closeModal();
  if (!currentPost?.path || !currentPost?.sha) return;
  try {
    await ghFetch(`/contents/${currentPost.path}`, {
      method: 'DELETE',
      body: JSON.stringify({ message: `delete: ${document.getElementById('postTitle').value}`, sha: currentPost.sha }),
    });
    showToast('文章已刪除', 'success');
    currentPost = null;
    document.getElementById('editorArea').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('articleSettings').style.display = 'none';
    await loadPosts();
  } catch (e) {
    showToast(`刪除失敗：${e.message}`, 'error');
  }
}

function showEditor() {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editorArea').style.display = 'flex';
  document.getElementById('articleSettings').style.display = 'block';
  switchTab('edit');
}

function switchTab(tab) {
  const isEdit = tab === 'edit';
  document.getElementById('editPane').style.display    = isEdit ? 'block' : 'none';
  document.getElementById('previewPane').style.display = isEdit ? 'none' : 'block';
  document.getElementById('tabEdit').className    = 'tab' + (isEdit ? ' active' : '');
  document.getElementById('tabPreview').className = 'tab' + (!isEdit ? ' active' : '');
  if (!isEdit) renderPreview();
}

function insertMd(before, after) {
  const ta = document.getElementById('postContent');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd   = s + before.length + sel.length;
  ta.focus();
  updateWordCount();
}

function updateWordCount() {
  const count = document.getElementById('postContent').value.replace(/\s/g, '').length;
  document.getElementById('wordCount').textContent = `${count} 字`;
}

function renderPreview() {
  const title = document.getElementById('postTitle').value;
  const desc  = document.getElementById('postDesc').value;
  const date  = document.getElementById('postDate').value;
  const cats  = getCheckboxValues('categoriesGroup');

  let md = document.getElementById('postContent').value
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^---$/gm, '<hr>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .split('\n\n')
    .map(p => p.match(/^<(h[1-6]|ul|blockquote|hr)/) ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`)
    .join('\n');

  document.getElementById('previewContent').innerHTML = `
    <h1>${title || '（無標題）'}</h1>
    <div class="preview-meta">${date}${cats.length ? ' · ' + cats.join(', ') : ''}</div>
    ${desc ? `<p><em>${desc}</em></p><hr>` : ''}${md}`;
}

function setupCheckboxGroup(groupId) {
  document.querySelectorAll(`#${groupId} .cb-item`).forEach(label => {
    label.addEventListener('click', e => {
      e.preventDefault();
      label.classList.toggle('checked');
    });
  });
}

function getCheckboxValues(groupId) {
  return Array.from(document.querySelectorAll(`#${groupId} .cb-item.checked`))
    .map(el => el.querySelector('input').value);
}

function setCheckboxValues(groupId, values) {
  document.querySelectorAll(`#${groupId} .cb-item`).forEach(label => {
    const val = label.querySelector('input').value;
    label.classList.toggle('checked', values.includes(val));
  });
}

function showToast(msg, type = 'success', duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = { success: '✓', error: '✕', loading: '⋯' }[type] || '•';
  toast.innerHTML = `<span>${icon}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}
</script>
